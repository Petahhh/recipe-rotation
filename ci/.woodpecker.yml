steps:
  preflight-gcp-auth:
    image: google/cloud-sdk:slim
    environment:
      # Application Default Credentials JSON (content of:
      # ~/.config/gcloud/application_default_credentials.json).
      GCP_ADC_JSON:
        from_secret: gcp_adc_json
      GCP_PROJECT_ID:
        from_secret: gcp_project_id
    commands:
      - umask 077
      - trap 'rm -f /tmp/gcp-adc.json /tmp/gcp-access-token' EXIT
      - printf '%s' "$GCP_ADC_JSON" > /tmp/gcp-adc.json
      - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-adc.json
      - gcloud auth application-default print-access-token > /tmp/gcp-access-token
      - gcloud --access-token-file=/tmp/gcp-access-token compute ssh recipe-rotation --project "$GCP_PROJECT_ID" --zone us-central1-b --command "whoami && sudo -n true && echo preflight_ok"

  deploy-nginx:
    image: google/cloud-sdk:slim
    depends_on:
      - preflight-gcp-auth
    environment:
      # Application Default Credentials JSON (content of:
      # ~/.config/gcloud/application_default_credentials.json).
      GCP_ADC_JSON:
        from_secret: gcp_adc_json
      GCP_PROJECT_ID:
        from_secret: gcp_project_id
    commands:
      - umask 077
      - trap 'rm -f /tmp/gcp-adc.json /tmp/gcp-access-token' EXIT
      - printf '%s' "$GCP_ADC_JSON" > /tmp/gcp-adc.json
      - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-adc.json
      - gcloud auth application-default print-access-token > /tmp/gcp-access-token
      - gcloud --access-token-file=/tmp/gcp-access-token compute ssh recipe-rotation --project "$GCP_PROJECT_ID" --zone us-central1-b --command "sudo apt-get update && sudo apt-get install -y nginx && sudo systemctl enable --now nginx"

  run-e2e-test:
    image: golang:1.22
    depends_on:
      - deploy-nginx
    commands:
      - GO111MODULE=off go test ./test/e2e -v -run TestEndpointServesTraffic

when:
  event: [push, pull_request]
